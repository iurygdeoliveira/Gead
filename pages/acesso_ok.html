<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso OK - GeAD</title>
    <link rel="icon" type="image/jpeg" href="../LOGO.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-900: #06401A;
            --green-800: #035921;
            --green-600: #0B8C2B;
            --green-500: #0AA631;
            --green-400: #1abf46;
            --green-100: #d6f5e0;
            --green-50: #edfaf2;
            --neutral-950: #0a0f0c;
            --neutral-500: #6b7f72;
            --neutral-400: #95a89c;
            --bg-main: #f0f4f1;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .success-container {
            text-align: center;
            padding: 3rem 2rem;
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--green-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.5s 0.2s ease-out both;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            color: var(--green-800);
        }

        .success-container h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            color: var(--neutral-950);
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .success-container p {
            color: var(--neutral-500);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--green-800);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 150ms ease;
        }

        .back-link:hover {
            color: var(--green-600);
            text-decoration: underline;
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <main class="success-container">
        <div class="success-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
            </svg>
        </div>
        <h1>Acesso ok</h1>
        <p>Você foi autenticado com sucesso no sistema GeAD.</p>
        <a href="landing_page.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
            Voltar à página inicial
        </a>
    </main>

</body>
</html>
